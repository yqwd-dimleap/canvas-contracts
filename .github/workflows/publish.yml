name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Pack and verify package contents
        id: pack
        run: |
          PACK_DIR="${RUNNER_TEMP:-/tmp}"
          npm pack --json --silent --pack-destination "$PACK_DIR" > pack.json
          TARBALL=$(node -e "const fs=require('fs'); const path=require('path'); const data=JSON.parse(fs.readFileSync('pack.json','utf8')); console.log(path.isAbsolute(data[0].filename) ? data[0].filename : path.join(process.env.PACK_DIR, data[0].filename))")
          node scripts/verify-package.mjs "$TARBALL"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
        env:
          PACK_DIR: ${{ runner.temp }}

      - name: Configure GitHub Packages auth
        run: |
          echo "@yqwd-dimleap:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc

      - name: Publish verified tarball to GitHub Packages
        run: npm publish "${{ steps.pack.outputs.tarball }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
